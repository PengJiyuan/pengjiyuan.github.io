<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="120" height="120" shape-rendering="crispEdges">
  <!-- Pixel Art Lobster - 24x24 grid, pixel size = 1 -->
  <!-- Color palette: dark=#8B1A1A, main=#DC2626, light=#F87171, highlight=#FCA5A5, white=#FFFFFF -->
  
  <!-- Antennae -->
  <rect x="10" y="1" width="1" height="1" fill="#8B1A1A"/>
  <rect x="11" y="0" width="1" height="1" fill="#8B1A1A"/>
  <rect x="13" y="1" width="1" height="1" fill="#8B1A1A"/>
  <rect x="12" y="0" width="1" height="1" fill="#8B1A1A"/>
  
  <!-- Eyes -->
  <rect x="9" y="3" width="1" height="1" fill="#1a1a1a"/>
  <rect x="14" y="3" width="1" height="1" fill="#1a1a1a"/>
  
  <!-- Head/Body top -->
  <rect x="8" y="4" width="8" height="1" fill="#DC2626"/>
  <rect x="7" y="5" width="10" height="1" fill="#DC2626"/>
  
  <!-- Claws - top part -->
  <rect x="3" y="5" width="4" height="1" fill="#DC2626"/>
  <rect x="2" y="6" width="3" height="1" fill="#DC2626"/>
  <rect x="1" y="7" width="2" height="1" fill="#DC2626"/>
  <rect x="0" y="7" width="1" height="2" fill="#DC2626"/>
  <rect x="1" y="9" width="1" height="1" fill="#F87171"/>
  <rect x="2" y="8" width="1" height="1" fill="#F87171"/>
  
  <rect x="17" y="5" width="4" height="1" fill="#DC2626"/>
  <rect x="19" y="6" width="3" height="1" fill="#DC2626"/>
  <rect x="21" y="7" width="2" height="1" fill="#DC2626"/>
  <rect x="23" y="7" width="1" height="2" fill="#DC2626"/>
  <rect x="22" y="9" width="1" height="1" fill="#F87171"/>
  <rect x="21" y="8" width="1" height="1" fill="#F87171"/>
  
  <!-- Claw pincers -->
  <rect x="0" y="9" width="1" height="1" fill="#8B1A1A"/>
  <rect x="0" y="10" width="1" height="1" fill="#8B1A1A"/>
  <rect x="1" y="10" width="1" height="1" fill="#FCA5A5"/>
  <rect x="1" y="9" width="1" height="1" fill="#FCA5A5"/>
  
  <rect x="23" y="9" width="1" height="1" fill="#8B1A1A"/>
  <rect x="23" y="10" width="1" height="1" fill="#8B1A1A"/>
  <rect x="22" y="10" width="1" height="1" fill="#FCA5A5"/>
  <rect x="22" y="9" width="1" height="1" fill="#FCA5A5"/>
  
  <!-- Body middle -->
  <rect x="7" y="6" width="10" height="1" fill="#DC2626"/>
  <rect x="6" y="7" width="12" height="1" fill="#DC2626"/>
  <rect x="6" y="8" width="12" height="1" fill="#DC2626"/>
  <rect x="7" y="9" width="10" height="1" fill="#DC2626"/>
  
  <!-- Body with highlight -->
  <rect x="8" y="7" width="2" height="2" fill="#F87171"/>
  <rect x="14" y="7" width="2" height="2" fill="#F87171"/>
  
  <!-- Legs left -->
  <rect x="5" y="9" width="1" height="1" fill="#8B1A1A"/>
  <rect x="4" y="10" width="1" height="1" fill="#8B1A1A"/>
  <rect x="3" y="11" width="1" height="1" fill="#8B1A1A"/>
  <rect x="2" y="12" width="1" height="1" fill="#8B1A1A"/>
  
  <!-- Legs right -->
  <rect x="18" y="9" width="1" height="1" fill="#8B1A1A"/>
  <rect x="19" y="10" width="1" height="1" fill="#8B1A1A"/>
  <rect x="20" y="11" width="1" height="1" fill="#8B1A1A"/>
  <rect x="21" y="12" width="1" height="1" fill="#8B1A1A"/>
  
  <!-- Tail segments -->
  <rect x="8" y="10" width="8" height="1" fill="#DC2626"/>
  <rect x="8" y="11" width="8" height="1" fill="#DC2626"/>
  <rect x="8" y="12" width="8" height="1" fill="#DC2626"/>
  
  <rect x="9" y="13" width="6" height="1" fill="#DC2626"/>
  <rect x="10" y="14" width="4" height="1" fill="#DC2626"/>
  <rect x="11" y="15" width="2" height="1" fill="#DC2626"/>
  
  <!-- Tail fan -->
  <rect x="7" y="13" width="1" height="1" fill="#F87171"/>
  <rect x="6" y="14" width="1" height="1" fill="#F87171"/>
  <rect x="5" y="15" width="1" height="1" fill="#8B1A1A"/>
  
  <rect x="16" y="13" width="1" height="1" fill="#F87171"/>
  <rect x="17" y="14" width="1" height="1" fill="#F87171"/>
  <rect x="18" y="15" width="1" height="1" fill="#8B1A1A"/>
  
  <rect x="11" y="16" width="2" height="1" fill="#F87171"/>
  <rect x="10" y="17" width="4" height="1" fill="#8B1A1A"/>
  <rect x="9" y="18" width="6" height="1" fill="#8B1A1A"/>
  
  <!-- Extra legs detail -->
  <rect x="5" y="10" width="1" height="1" fill="#8B1A1A"/>
  <rect x="18" y="10" width="1" height="1" fill="#8B1A1A"/>
  <rect x="4" y="11" width="1" height="1" fill="#8B1A1A"/>
  <rect x="19" y="11" width="1" height="1" fill="#8B1A1A"/>
</svg>
