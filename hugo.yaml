baseURL: "https://pengjiyuan.github.io/"
languageCode: "zh-CN"
title: "Peng's Blog"
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

defaultContentLanguage: zh
hasCJKLanguage: true

minify:
  disableXML: true
  minifyOutput: true

pagination:
  pagerSize: 12

params:
  env: production
  title: "Peng's Blog"
  description: "关于 AI 的技术、资讯与思考。AI 动的是认知本身，值得认真对待。"
  keywords: [AI, 人工智能, ChatGPT, Claude, Prompt, LLM, RAG, Agent, MCP]
  author: PengJiyuan
  DateFormat: "2006-01-02"
  defaultTheme: auto
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: true

  assets:
    favicon: "/images/favicon.ico"

  # 首页模式：profile（个人介绍）
  homeInfoParams:
    Title: "Peng's Blog"
    Content: |
      嗨，我是 Peng 👋

      我有时候会想，AI 这波浪潮和以往的技术革命有什么不同。蒸汽机解放了体力，互联网消除了信息差，但 AI 动的是认知本身——它开始能理解语言、生成思路、做出判断。这让我觉得有点不安，又很兴奋。

      不安，是因为我们还没想清楚边界在哪。兴奋，是因为这是我见过的、离“智能”最近的一次。

      现在的大模型已经很能干了，但我更感兴趣的是：它究竟在“理解”什么？还是只是在做极其复杂的模式匹配？当它给出一个很好的答案，那是推理，还是记忆？这些问题可能没有标准答案，但值得一直追问下去。

      技术会过时，但对技术的追问不会。

  socialIcons:
    - name: github
      url: "https://github.com/PengJiyuan"
    - name: rss
      url: "/index.xml"

  # 搜索
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 1
    limit: 10
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: articles
      name: "技术文章"
      url: /articles/
      weight: 20
    - identifier: news
      name: "每日资讯"
      url: /news/
      weight: 30
    - identifier: tags
      name: "标签"
      url: /tags/
      weight: 40
    - identifier: archives
      name: "归档"
      url: /archives/
      weight: 50
    - identifier: search
      name: "搜索"
      url: /search/
      weight: 60
    - identifier: about
      name: "关于"
      url: /about/
      weight: 70

outputs:
  home:
    - HTML
    - RSS
    - JSON # 搜索功能需要

markup:
  goldmark:
    renderer:
      unsafe: true # 允许 HTML
  highlight:
    noClasses: false
    anchorLineNos: true
    codeFences: true
    guessSyntax: true
    lineNos: true
    style: github-dark
