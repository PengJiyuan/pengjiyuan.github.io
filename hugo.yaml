baseURL: "https://pengjiyuan.github.io/"
languageCode: "zh-CN"
title: "Peng's Blog"
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

defaultContentLanguage: zh
hasCJKLanguage: true

minify:
  disableXML: true
  minifyOutput: true

pagination:
  pagerSize: 12

params:
  env: production
  title: "Peng's Blog"
  description: "从零开始，体系化学习 AI。面向开发者和 AI 新手的技术博客。"
  keywords: [AI, 人工智能, ChatGPT, Claude, Prompt, LLM, RAG, Agent, MCP]
  author: PengJiyuan
  DateFormat: "2006-01-02"
  defaultTheme: auto
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: true

  assets:
    favicon: "/images/favicon.ico"

  # 首页模式：profile（个人介绍）
  homeInfoParams:
    Title: "Peng's Blog"
    Content: |
      欢迎来到 **Peng's Blog** —— 从零开始，体系化学习 AI。

      > 面向开发者和 AI 新手的技术博客，涵盖 **AI 教程**、**技术文章**、**每日资讯** 三大板块。

  socialIcons:
    - name: github
      url: "https://github.com/PengJiyuan"
    - name: rss
      url: "/index.xml"

  # 搜索
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 1
    limit: 10
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: articles
      name: "技术文章"
      url: /articles/
      weight: 20
    - identifier: news
      name: "每日资讯"
      url: /news/
      weight: 30
    - identifier: tags
      name: "标签"
      url: /tags/
      weight: 40
    - identifier: archives
      name: "归档"
      url: /archives/
      weight: 50
    - identifier: search
      name: "搜索"
      url: /search/
      weight: 60
    - identifier: about
      name: "关于"
      url: /about/
      weight: 70

outputs:
  home:
    - HTML
    - RSS
    - JSON # 搜索功能需要

markup:
  goldmark:
    renderer:
      unsafe: true # 允许 HTML
  highlight:
    noClasses: false
    anchorLineNos: true
    codeFences: true
    guessSyntax: true
    lineNos: true
    style: monokai
